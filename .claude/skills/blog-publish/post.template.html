<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} · Kam Woh Ng</title>
  <meta name="description" content="{{BLURB}}">
  <meta name="author" content="Kam Woh Ng">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <link rel="canonical" href="https://kamwoh.github.io/blog/{{SLUG}}/">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{BLURB}}">
  <meta property="og:url" content="https://kamwoh.github.io/blog/{{SLUG}}/">
  <meta property="og:image" content="https://kamwoh.github.io/images/profile.png">
  <meta property="og:site_name" content="Kam Woh Ng">
  <meta property="article:author" content="Kam Woh Ng">
  <meta property="article:published_time" content="{{DATE}}">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:creator" content="@kam_woh">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{BLURB}}">

  <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/images/favicon-16x16.png" sizes="16x16">
  <link rel="alternate" type="application/rss+xml" title="Kam Woh Ng — Blog" href="/feed.xml">
  <link rel="stylesheet" href="/assets/css/style.css">

  <!-- JSON-LD: BlogPosting -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{TITLE}}",
    "description": "{{BLURB}}",
    "datePublished": "{{DATE}}",
    "dateModified": "{{DATE}}",
    "author": {
      "@type": "Person",
      "name": "Kam Woh Ng",
      "url": "https://kamwoh.github.io/"
    },
    "image": "https://kamwoh.github.io/images/profile.png",
    "url": "https://kamwoh.github.io/blog/{{SLUG}}/",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "https://kamwoh.github.io/blog/{{SLUG}}/"
    },
    "publisher": {
      "@type": "Person",
      "name": "Kam Woh Ng"
    }
  }
  </script>

  <!-- JSON-LD: Breadcrumbs -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://kamwoh.github.io/" },
      { "@type": "ListItem", "position": 2, "name": "Blog", "item": "https://kamwoh.github.io/#blog" },
      { "@type": "ListItem", "position": 3, "name": "{{TITLE}}", "item": "https://kamwoh.github.io/blog/{{SLUG}}/" }
    ]
  }
  </script>
</head>
<body>

  <!-- ===== Loading overlay ===== -->
  <div id="loader" class="loader">
    <div class="loader__terminal">
      <div class="loader__line">
        <span class="loader__prompt">&gt; </span>
        <span class="loader__typed" id="loader-typed"></span>
        <span class="loader__cursor" id="loader-cursor"></span>
      </div>
      <div id="loader-tasks"></div>
    </div>
  </div>

  <div id="site" class="site hidden">

    <header class="topbar">
      <div class="topbar__inner">
        <span class="topbar__name">kamwoh.github.io</span>
        <nav class="topbar__nav">
          <a href="/#about">About</a>
          <a href="/#journey">Journey</a>
          <a href="/#publications">Publications</a>
          <a href="/#blog">Blog</a>
          <a href="/files/cv.pdf" target="_blank">CV</a>
        </nav>
      </div>
    </header>

    <main class="main">

      <article class="post" itemscope itemtype="https://schema.org/BlogPosting">
        <nav class="post__crumbs" aria-label="Breadcrumb">
          <a href="/">~</a>
          <span class="post__crumb-sep">/</span>
          <a href="/#blog">blog</a>
          <span class="post__crumb-sep">/</span>
          <span>{{SLUG}}</span>
        </nav>

        <header class="post__header">
          <h1 class="post__title" itemprop="headline">{{TITLE}}</h1>
          <div class="post__meta">
            <time class="post__date" datetime="{{DATE}}" itemprop="datePublished">{{DATE}}</time>
            <span class="post__sep">·</span>
            <span class="post__author" itemprop="author" itemscope itemtype="https://schema.org/Person">
              <span itemprop="name">Kam Woh Ng</span>
            </span>
          </div>
        </header>

        <div class="post__body" itemprop="articleBody">
{{BODY_HTML}}
        </div>
      </article>

    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span class="footer__prompt">&gt;</span>
        <a href="/" class="footer__text">&larr; back to home</a>
        <span class="footer__sep">|</span>
        <span class="footer__text">&copy; 2026 Kam Woh Ng</span>
      </div>
    </footer>

  </div>

  <script src="/assets/js/main.js"></script>
</body>
</html>
